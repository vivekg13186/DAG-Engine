name: web-scrape-demo
version: "1.0"
description: |
  Fetch a page and pull out a few values using both CSS and XPath queries.
  The page (example.com) is small and stable — handy for verifying the plugin.

data:
  url: "https://example.com"

nodes:
  # 1. Download + extract.
  - name: scrape
    action: web.scrape
    inputs:
      url: "${url}"
      timeoutMs: 10000
      queries:
        - { name: title,       type: css,   selector: "h1" }                          # text
        - { name: paragraphs,  type: css,   selector: "p", all: true }                # array of strings
        - { name: linkHref,    type: css,   selector: "a", attr: "href" }             # first href
        - { name: allLinks,    type: css,   selector: "a", attr: "href", all: true }  # array of hrefs
        - { name: pageHtml,    type: css,   selector: "body", extract: outerHTML }    # raw HTML

        # XPath examples
        - { name: ianaText,    type: xpath, selector: "//a[contains(@href, 'iana')]/text()" }
        - { name: paragraphCount, type: xpath, selector: "count(//p)" }                # number primitive
    outputs:
      results: scraped       # ctx.scraped = the per-query result map
      status:  httpStatus    # ctx.httpStatus = 200 (etc.)

  # 2. Gate on a successful fetch.
  - name: report
    action: log
    executeIf: "${httpStatus == 200}"
    inputs:
      message: "Title='${nodes.scrape.output.results.title}' · ${nodes.scrape.output.results.paragraphCount} paragraph(s)"

edges:
  - { from: scrape, to: report }
